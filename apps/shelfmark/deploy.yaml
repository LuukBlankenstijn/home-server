apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelfmark
  namespace: shelfmark
spec:
  replicas: 1
  selector:
    matchLabels: { app: shelfmark }
  template:
    metadata:
      labels: { app: shelfmark }
    spec:
      containers:
        - name: shelfmark
          image: ghcr.io/calibrain/shelfmark:v1.3.3
          imagePullPolicy: Always
          # Linux 6.10+ kernels drop CONFIG_NETFILTER_XTABLES_LEGACY; the image's
          # tor.sh fails on `iptables-legacy -t filter`. Switch alternatives to nft
          # before entrypoint. Upstream: calibrain/shelfmark#1006, #1021.
          command: ["/bin/bash", "-c"]
          args:
            - |
              update-alternatives --set iptables /usr/sbin/iptables-nft &&
              update-alternatives --set ip6tables /usr/sbin/ip6tables-nft &&
              exec /usr/bin/dumb-init -- /app/entrypoint.sh
          ports:
            - containerPort: 8084
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: USING_TOR
              value: "true"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: books
              mountPath: /books
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: books
          persistentVolumeClaim:
            claimName: shelfmark-books
        - name: config
          persistentVolumeClaim:
            claimName: shelfmark-config
        - name: downloads
          persistentVolumeClaim:
            claimName: shelfmark-downloads
