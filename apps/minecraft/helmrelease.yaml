apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: 30m
  targetNamespace: minecraft
  chart:
    spec:
      chart: minecraft
      version: "5.1.3"
      sourceRef:
        kind: HelmRepository
        name: itzg-minecraft-server-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: minecraft

    image:
      pullPolicy: IfNotPresent

    workloadAsStatefulSet: true
    strategyType: RollingUpdate

    minecraftServer:
      motd: "minecraft server"
      eula: "TRUE"
      type: "FABRIC"
      version: "26.2"
      difficulty: normal
      serviceType: ClusterIP
      servicePort: 25565
      memory: "6144M"

    extraEnv:
      MODRINTH_PROJECTS: "fabric-api,lithium,ferrite-core,krypton,c2me-fabric,spark"
      MODRINTH_ALLOWED_VERSION_TYPE: "alpha"

    resources:
      requests:
        memory: 7168Mi
        cpu: 1000m

    persistence:
      storageClass: longhorn
      dataDir:
        enabled: true
        Size: 10Gi
