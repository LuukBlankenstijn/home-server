apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: minecraft
  namespace: minecraft
spec:
  entryPoints:
    - minecraft
  routes:
    # Minecraft's protocol is not TLS, so match all SNI on this dedicated entrypoint.
    - match: HostSNI(`*`)
      services:
        - name: minecraft
          port: 25565
