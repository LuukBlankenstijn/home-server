apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: proxy-auth
  namespace: authentik
spec:
  forwardAuth:
    address: http://authentik-authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    maxResponseBodySize: 65536
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: auth-redirect
  namespace: authentik
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostRegexp(`^.+\.luukblankenstijn\.nl$`) && PathPrefix(`/outpost.goauthentik.io/`)
      priority: 99999
      services:
        - name: authentik-authentik-server
          port: 80
