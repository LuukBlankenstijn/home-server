apiVersion: v1
kind: Config
clusters:
- name: home
  cluster:
    server: https://home.netbird-kubeapi-proxy.peers.luuk.internal:443
    insecure-skip-tls-verify: true
users:
- name: mesh
  user:
    token: unused-proxy-authenticates-by-netbird-mesh-identity
contexts:
- name: home
  context:
    cluster: home
    user: mesh
current-context: home
