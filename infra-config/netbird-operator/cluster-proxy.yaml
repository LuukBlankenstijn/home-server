apiVersion: v1
kind: ServiceAccount
metadata:
  name: clusterproxy-home
  namespace: netbird
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clusterproxy-home
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["userextras/*", "uids"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clusterproxy-home
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clusterproxy-home
subjects:
  - kind: ServiceAccount
    name: clusterproxy-home
    namespace: netbird
---
apiVersion: netbird.io/v1alpha1
kind: ClusterProxy
metadata:
  name: home
  namespace: netbird
spec:
  clusterName: home
  serviceAccountName: clusterproxy-home
  groups:
    - name: kubernetes-api
