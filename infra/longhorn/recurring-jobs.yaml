apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshot
  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 3 3 * * ?
  groups:
    - default
  labels:
    job: snapshot-daily
  name: daily-snapshot
  parameters: {}
  retain: 31
  task: snapshot
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: fs-trim
  namespace: longhorn-system
spec:
  concurrency: 1
  cron: 0 0 ? * SUN
  groups:
    - default
  labels:
    job: fs-trim
  name: fs-trim
  task: filesystem-trim
