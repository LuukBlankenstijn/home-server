apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage-operator
  namespace: flux-system
spec:
  releaseName: garage-operator
  targetNamespace: garage-operator-system
  storageNamespace: garage-operator-system
  chart:
    spec:
      chart: garage-operator
      version: "0.5.3"
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: garage-operator
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
