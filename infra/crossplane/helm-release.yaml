apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: flux-system
spec:
  releaseName: crossplane
  targetNamespace: crossplane-system
  chart:
    spec:
      chart: crossplane
      version: "2.2.1"
      sourceRef:
        kind: HelmRepository
        name: crossplane-stable
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
