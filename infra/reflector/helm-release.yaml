apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: flux-system
spec:
  releaseName: reflector
  interval: 1h
  targetNamespace: reflector
  chart:
    spec:
      chart: reflector
      version: 10.0.37
      sourceRef:
        kind: HelmRepository
        name: emberstack-charts
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
